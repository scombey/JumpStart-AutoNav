# Sprint: {{Sprint Name}}
# Generated by Scrum Master Agent
# Template for sprint initialisation alongside sprint-planning.md

sprint:
  name: "{{Sprint N}}"
  goal: "{{One sentence sprint goal}}"
  start_date: "{{YYYY-MM-DD}}"
  end_date: "{{YYYY-MM-DD}}"
  duration_days: 14
  velocity_target: null  # tasks per sprint (null = auto from history)

board:
  not_started:
    - id: "T001"
      story: "E1-S1"
      title: "{{Task title}}"
      assignee: null
      estimate_hours: null
      dependencies: []
      priority: "must"  # must | should | could

  in_progress: []

  done: []

  blocked:
    # - id: "T00N"
    #   story: "E1-SN"
    #   title: "{{Task title}}"
    #   blocker: "{{Description of blocker}}"
    #   blocked_since: "{{YYYY-MM-DD}}"
    #   escalated: false

dependencies:
  # Task dependency graph (task_id -> depends_on)
  # T002: [T001]
  # T005: [T002, T004]

velocity:
  historical:
    # sprint_1: { planned: 10, completed: 8, carried_over: 2 }
  current:
    planned: 0
    completed: 0
    carried_over: 0
    burndown: []
    # burndown entries: { day: 1, remaining: N, ideal: N }

risks:
  - id: "R-001"
    description: "{{Risk description}}"
    probability: "medium"  # low | medium | high
    impact: "medium"       # low | medium | high
    mitigation: "{{Mitigation plan}}"
    owner: null
    status: "open"         # open | mitigated | occurred

ceremonies:
  standup:
    frequency: "daily"
    format: "async"  # async | sync
    time: null
  review:
    day: "last"
    duration_minutes: 30
  retrospective:
    day: "last"
    duration_minutes: 30
    tool: "/jumpstart.retro"

definition_of_done:
  - "Code follows architecture guidelines"
  - "Unit tests written and passing"
  - "Integration tests pass (where applicable)"
  - "Code review completed"
  - "Documentation updated"
  - "No new linting errors"
  - "Acceptance criteria verified"
