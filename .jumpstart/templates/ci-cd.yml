name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "[VERSION]"          # e.g., "20"
  # PYTHON_VERSION: "[VERSION]"      # Uncomment for Python projects
  # JAVA_VERSION: "[VERSION]"        # Uncomment for Java projects

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      # - run: npm run typecheck  # Uncomment for TypeScript

  # ── Unit & Integration Tests ───────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm test
      # - run: npm run test:coverage  # Uncomment for coverage reporting

  # ── Build ──────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: build-output
      #     path: dist/

