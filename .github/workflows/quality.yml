name: Spec Quality Gate

on:
  pull_request:
    paths:
      - 'specs/**'
      - '.jumpstart/**'
      - 'tests/**'
      - 'bin/bootstrap.js'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'install.sh'
      - 'tsconfig.json'
  push:
    branches: [main]
    paths:
      - 'specs/**'
      - '.jumpstart/**'
      - 'tests/**'
      - 'bin/bootstrap.js'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  quality-gate:
    name: 5-Layer Quality Gate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 7
    strategy:
      fail-fast: false
      matrix:
        # Strangler phase: support both 22 (Maintenance LTS) and 24 (Active LTS).
        # Per ADR-005 + Pit Crew Adversary, 1.x stays on >=22 floor.
        node: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dist (M11 phase 5g hooks import from dist/lib)
        run: npm run build

      - name: Layer 1 — Schema & Formatting
        run: npx vitest run tests/test-schema.test.js --reporter=verbose

      - name: Layer 2 — Handoff Contracts
        run: npx vitest run tests/test-handoffs.test.js --reporter=verbose

      - name: Layer 3 — Unit Tests for English
        run: npx vitest run tests/test-spec-quality.test.js --reporter=verbose

      # Layer 5 - Regression Golden Masters - is exercised by the
      # holodeck baseline scenario in .github/workflows/e2e.yml plus the
      # cluster harnesses below. The legacy standalone regression test
      # was removed in M11 phase 5e (issue 34).

      - name: Vitest full suite
        if: always()
        run: npx vitest run

      - name: npm audit (gate at high)
        if: always()
        run: npm audit --audit-level=high
